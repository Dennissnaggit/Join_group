<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join - Board</title>
    <link rel="icon" type="image/png" href="../assets/logo/fav_icon.png">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../style/app_layout.css">
    <link rel="stylesheet" href="../style/components.css">
    <link rel="stylesheet" href="../style/board_style.css">
    <script src="../script/firebase.js"></script>
    <script src="../script.js"></script>
    <script src="../script/board.js" defer></script> </head>
<body onload="init().then(() => { if (typeof initBoard === 'function') initBoard(); })">

    <div class="app-shell">
        <div w3-include-html="../components/sidebar.html"></div>

        <div class="main-content-wrapper">
            <div w3-include-html="../components/header.html"></div>

            <main class="content-panel" id="content">
                <div class="board-content-container">
                    <section class="board-top-row" aria-label="Board header and actions">
                        <h1>Board</h1>

                        <a class="board-add-task-btn" href="./add_task.html" aria-label="Add task">
                            <span class="board-add-task-text">Add task</span>
                            <span class="board-add-task-plus">+</span>
                        </a>

                        <div class="board-toolbar" aria-label="Board actions">
                            <div class="board-search-wrapper">
                            <input
                                id="boardSearchInput"
                                class="board-search-input"
                                type="search"
                                placeholder="Find task"
                                aria-label="Find task"
                            >
                            <span class="board-search-right" aria-hidden="true">
                                <span class="board-search-divider"></span>
                                <span class="board-search-icon"></span>
                            </span>
                            </div>
                        </div>
                    </section>

                    <section class="board-columns" aria-label="Kanban columns">
                        <article class="board-column" data-status="todo">
                            <header class="board-column-header">
                                <h2>To do</h2>
                                <a class="board-column-add-btn" href="./add_task.html" aria-label="Add task to To do">
                                    <img src="../assets/icons/board/plus_button.png" alt="">
                                </a>
                            </header>
                            <div id="boardColumnTodo" class="board-task-list"></div>
                        </article>

                        <article class="board-column" data-status="in-progress">
                            <header class="board-column-header">
                                <h2>In progress</h2>
                                <a class="board-column-add-btn" href="./add_task.html" aria-label="Add task to In progress">
                                    <img src="../assets/icons/board/plus_button.png" alt="">
                                </a>
                            </header>
                            <div id="boardColumnInProgress" class="board-task-list"></div>
                        </article>

                        <article class="board-column" data-status="await-feedback">
                            <header class="board-column-header">
                                <h2>Await feedback</h2>
                                <a class="board-column-add-btn" href="./add_task.html" aria-label="Add task to Await feedback">
                                    <img src="../assets/icons/board/plus_button.png" alt="">
                                </a>
                            </header>
                            <div id="boardColumnAwaitFeedback" class="board-task-list"></div>
                        </article>

                        <article class="board-column" data-status="done">
                            <header class="board-column-header">
                                <h2>Done</h2>
                                <a class="board-column-add-btn" href="./add_task.html" aria-label="Add task to Done">
                                    <img src="../assets/icons/board/plus_button.png" alt="">
                                </a>
                            </header>
                            <div id="boardColumnDone" class="board-task-list"></div>
                        </article>
                    </section>

                    <div id="boardTaskOverlay" class="board-task-overlay" role="dialog" aria-modal="true" aria-label="Task details">
                        <article id="boardTaskModalContent" class="board-task-modal"></article>
                    </div>
                </div>
            </main>
        </div>
    </div>

</body>
</html>
