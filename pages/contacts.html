<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join - Contacts</title>
    <link rel="icon" type="image/png" href="../assets/logo/fav_icon.png">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../style/app_layout.css">
    <link rel="stylesheet" href="../style/components.css">
    <link rel="stylesheet" href="../style/contacts_style.css"> 
    <script type="module" src="../script/firebase.js"></script>
    <script src="../script.js"></script>
    <script src="../script/contacts_template.js"></script>
    <script src="../script/contacts.js"></script> 
</head>
<body onload="init().then(() => { if (typeof initContacts === 'function') initContacts(); })">

    <div class="app-shell">
        <div w3-include-html="../components/sidebar.html"></div>

        <div class="main-content-wrapper">
            <div w3-include-html="../components/header.html"></div>

            <main class="content-panel" id="content">
                <div class="contacts-main-grid">

                    <div class="contacts-sidebar-list">
                        <div class="button-wrapper">
                            <button class="add-new-contact-btn" onclick="openAddContactModal()">
                                Add new contact
                                <img src="../assets/icons/edit_person.svg"></button>
                            </div>
                            <div id="contactsListContainer" class="contacts-scrollable-area"></div>
                        </div>

                        <div class="contacts-detail-panel">
                            <div class="contacts-header-title">
                                <h1>Contacts</h1>
                                <div class="title-divider"></div>
                                <span>Better with a team</span>
                            </div>
                            <div id="contactDetailContainer" class="detail-content-placeholder">
                                <p class="select-hint">Select a contact to view details.</p>
                        </div>
                    </div>

                </div>
            </main>

        </div>
    </div>

    <div id="contactModalOverlay" class="modal-overlay d-none" onclick="closeContactModal()">
        <div id="contactModalContent" class="modal-content" onclick="event.stopPropagation()"></div>
    </div>
    <div id="mobileActionMenu" class="mobile-action-menu d-none-desktop">
        <button class="action-btn-edit" onclick="openEditModal('${contact.id}')">
            <img src="../assets/icons/edit.svg" alt="Edit"> Edit
        </button>
        <button class="action-btn-delete" onclick="deleteContact('${contact.id}')">
            <img src="../assets/icons/delete.svg" alt="Delete"> Delete
        </button>
    </div>

</body>
</html>
