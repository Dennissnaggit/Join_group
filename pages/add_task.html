<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join - Add Task</title>
    <link rel="icon" type="image/png" href="../assets/logo/fav_icon.png" />
    <link
      rel="stylesheet"
      href="../node_modules/bootstrap/dist/css/bootstrap.min.css"
    />

    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="../style/app_layout.css" />
    <link rel="stylesheet" href="../style/add_task.css" />
    <script src="../script/firebase.js"></script>
    <script src="../script.js"></script>
    <script src="../script/add_task.js" defer></script>
    <script src="../node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
  </head>
  <body
    onload="
      init().then(() => {
        if (typeof initAddTask === 'function') initAddTask();
      })
    "
  >
    <div class="app-shell">
      <div w3-include-html="../components/sidebar.html"></div>

      <div class="main-content-wrapper">
        <div w3-include-html="../components/header.html"></div>

        <main class="content-panel" id="content">
          <div class="headerTask">
            <h1>Add Task</h1>
          </div>
          <div class="inputsTask">
            <div class="inputLeft">
              <div class="mb-3">
                <label for="exampleFormControlInput1" class="form-label"
                  >Title</label
                >
                <input
                  type="text"
                  class="form-control"
                  id="TitleOfTask"
                  placeholder="Title of the task"
                />
              </div>
              <div class="mb-3">
                <label for="exampleFormControlTextarea1" class="form-label"
                  >Example textarea</label
                >
                <textarea
                  class="form-control"
                  id="exampleFormControlTextarea1"
                  rows="3"
                ></textarea>
              </div>
              <div class="mb-3">
                <label for="exampleFormControlInput1" class="form-label"
                  >Datum</label
                >
                <input
                  type="date"
                  class="form-control"
                  id="exampleFormControlInput1"
                  placeholder="name@example.com"
                />
              </div>
            </div>
            <div class="inputRight">
             <div class="prioritySection">
  <h3>Priority</h3>

  <div class="priorityButtons">
    <input
      type="radio"
      class="btn-check"
      name="priority"
      id="urgent"
      autocomplete="off"
    />
    <label class="priorityBtn urgentBtn" for="urgent">
  <span>Urgent</span>
  <span>⏫</span>
</label>

    <input
      type="radio"
      class="btn-check"
      name="priority"
      id="medium"
      autocomplete="off"
    />
   <label class="priorityBtn mediumBtn" for="medium">
  <span>Medium</span>
  <span>=</span>
</label>

    <input
      type="radio"
      class="btn-check"
      name="priority"
      id="low"
      autocomplete="off"
    />
   
<label class="priorityBtn lowBtn" for="low">
  <span>Low</span>
  <span>⏬</span>
</label>
  </div>
</div>
              <div class="multi-select">
                <div class="input-field" id="inputField">
                  Auswahl treffen
                  <span>▼</span>
                </div>

                <div class="dropdown" id="dropdown">
                  <label>
                    <input type="checkbox" value="Apfel" />
                    Dennis
                  </label>

                  <label>
                    <input type="checkbox" value="Banane" />
                    Frank
                  </label>

                  <label>
                    <input type="checkbox" value="Kirsche" />
                    Thomas
                  </label>

                  <label>
                    <input type="checkbox" value="Mango" />
                    Uschi
                  </label>

                  <label>
                    <input type="checkbox" value="Orange" />
                    Banane
                  </label>
                </div>

                <div class="selected-items" id="selectedItems"></div>
              </div>
              <div class="mb-3">
                <label for="category" class="form-label">Categoriy*</label>
                <select class="form-select" id="category" name="category">
                  <option value="">Select task category</option>
                  <option value="kategorie1">User Story</option>
                  <option value="kategorie2">Technical Task</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label fw-bold">Subtask</label>

                <div class="position-relative">
                  <input
                    type="text"
                    id="subtaskInput"
                    class="form-control pe-5"
                    placeholder="Neue Subtask eingeben"
                  />

                  <button
                    type="button"
                    id="addBtn"
                    class="btn btn-success position-absolute top-50 end-0 translate-middle-y me-2 d-none"
                    onclick="addSubtask()"
                  >
                    +
                  </button>
                </div>
              </div>

              <ul id="subtaskList" class="list-group"></ul>
            </div>
          </div>
          <div clas="footerTaskFull">
            <div class="footerTask">
              <h4>*required fields</h4>
            </div>
            <div class="footerButtons">
              <button>X Clear</button>
              <button>Create Task</button>
            </div>
          </div>
        </main>
      </div>
    </div>

    <nav class="mobile-footer">
      <a href="summary.html" class="footer-item">
        <img src="../assets/icons/summary.svg" alt="" />
        <span>Summary</span>
      </a>
      <a href="add_task.html" class="footer-item">
        <img src="../assets/icons/add_task.svg" alt="" />
        <span>Add Task</span>
      </a>
      <a href="board.html" class="footer-item">
        <img src="../assets/icons/board.svg" alt="" />
        <span>Board</span>
      </a>
      <a href="contacts.html" class="footer-item">
        <img src="../assets/icons/contacts.svg" alt="" />
        <span>Contacts</span>
      </a>
    </nav>
  </body>
</html>
